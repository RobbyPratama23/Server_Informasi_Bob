<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catatan</title>
<style>
  :root{
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --ink: #1E1E1C;
    --ink-soft: #6B6B66;
    --line: #E4E2DC;
    --accent: #5B6B58;
    --accent-soft: #EDF0EA;
    --danger: #9C4A3C;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  body{
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
    padding: 48px 20px 80px;
  }

  .wrap{
    max-width: 640px;
    margin: 0 auto;
  }

  header{
    margin-bottom: 40px;
  }

  header .eyebrow{
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  header h1{
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  header p{
    color: var(--ink-soft);
    font-size: 14px;
    margin-top: 6px;
  }

  /* form */
  .form-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 36px;
  }

  .field{
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  .field label{
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 500;
  }

  .field input,
  .field textarea{
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 12px;
    resize: vertical;
    outline: none;
    transition: border-color .15s ease;
  }

  .field textarea{ min-height: 80px; line-height: 1.5; }

  .field input:focus,
  .field textarea:focus{
    border-color: var(--accent);
  }

  .form-actions{
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  button{
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    border-radius: 6px;
    border: 1px solid transparent;
    padding: 9px 16px;
    cursor: pointer;
    transition: opacity .15s ease, background .15s ease;
  }
  button:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }

  .btn-primary{
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover{ opacity: .88; }

  .btn-ghost{
    background: transparent;
    color: var(--ink-soft);
    border-color: var(--line);
  }
  .btn-ghost:hover{ background: var(--accent-soft); color: var(--ink); }

  /* list */
  .list-head{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .list-head h2{
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    font-weight: 600;
  }

  .count{
    font-size: 12px;
    color: var(--ink-soft);
  }

  .items{
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .item{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 18px;
  }

  .item-head{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .item-title{
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    word-break: break-word;
  }

  .item-body{
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.6;
    margin-top: 6px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .item-meta{
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 10px;
    opacity: .7;
  }

  .item-actions{
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .icon-btn{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    width: 30px;
    height: 30px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover{ background: var(--accent-soft); color: var(--ink); }
  .icon-btn.delete:hover{ background: #F5E9E6; color: var(--danger); border-color: #E3C9C2; }

  .empty{
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-soft);
    border: 1px dashed var(--line);
    border-radius: 10px;
    font-size: 13.5px;
  }

  .status{
    font-size: 12px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 28px;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="eyebrow">Catatan Pribadi</div>
    <h1>Informasi Saya</h1>
    <p>Tambah, ubah, dan hapus catatan berjudul di satu tempat.</p>
  </header>

  <div class="form-card">
    <div class="field">
      <label for="titleInput">Judul</label>
      <input id="titleInput" type="text" placeholder="Contoh: Ide proyek baru" maxlength="120">
    </div>
    <div class="field">
      <label for="bodyInput">Informasi</label>
      <textarea id="bodyInput" placeholder="Tulis detailnya di sini..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-ghost" id="cancelBtn" style="display:none;">Batal</button>
      <button class="btn-primary" id="saveBtn">Simpan Catatan</button>
    </div>
  </div>

  <div class="list-head">
    <h2>Semua Catatan</h2>
    <span class="count" id="countLabel">0 catatan</span>
  </div>

  <div class="items" id="itemsList"></div>
  <div class="empty" id="emptyState" style="display:none;">Belum ada catatan. Tambahkan yang pertama di atas.</div>
  <div class="status" id="statusLabel"></div>
</div>

<script>
  const STORAGE_KEY = 'notes:list';
  let notes = [];
  let editingId = null;

  const titleInput = document.getElementById('titleInput');
  const bodyInput = document.getElementById('bodyInput');
  const saveBtn = document.getElementById('saveBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const itemsList = document.getElementById('itemsList');
  const emptyState = document.getElementById('emptyState');
  const countLabel = document.getElementById('countLabel');
  const statusLabel = document.getElementById('statusLabel');

  function uid(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function formatDate(ts){
    const d = new Date(ts);
    return d.toLocaleString('id-ID', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function loadNotes(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      notes = raw ? JSON.parse(raw) : [];
    }catch(e){
      notes = [];
    }
    render();
  }

  function persist(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
      statusLabel.textContent = 'Tersimpan';
      setTimeout(()=>{ statusLabel.textContent=''; }, 1500);
    }catch(e){
      statusLabel.textContent = 'Gagal menyimpan, coba lagi';
    }
  }

  function resetForm(){
    titleInput.value = '';
    bodyInput.value = '';
    editingId = null;
    saveBtn.textContent = 'Simpan Catatan';
    cancelBtn.style.display = 'none';
  }

  async function saveNote(){
    const title = titleInput.value.trim();
    const body = bodyInput.value.trim();
    if(!title){
      titleInput.focus();
      titleInput.style.borderColor = '#9C4A3C';
      setTimeout(()=>{ titleInput.style.borderColor=''; }, 900);
      return;
    }

    if(editingId){
      const idx = notes.findIndex(n => n.id === editingId);
      if(idx !== -1){
        notes[idx].title = title;
        notes[idx].body = body;
        notes[idx].updatedAt = Date.now();
      }
    }else{
      notes.unshift({ id: uid(), title, body, createdAt: Date.now(), updatedAt: Date.now() });
    }

    persist();
    resetForm();
    render();
  }

  function editNote(id){
    const note = notes.find(n => n.id === id);
    if(!note) return;
    titleInput.value = note.title;
    bodyInput.value = note.body;
    editingId = id;
    saveBtn.textContent = 'Perbarui Catatan';
    cancelBtn.style.display = 'inline-block';
    titleInput.focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deleteNote(id){
    notes = notes.filter(n => n.id !== id);
    persist();
    if(editingId === id) resetForm();
    render();
  }

  function render(){
    itemsList.innerHTML = '';
    countLabel.textContent = notes.length + (notes.length === 1 ? ' catatan' : ' catatan');
    emptyState.style.display = notes.length === 0 ? 'block' : 'none';

    notes.forEach(note => {
      const el = document.createElement('div');
      el.className = 'item';
      el.innerHTML = `
        <div class="item-head">
          <div class="item-title">${escapeHtml(note.title)}</div>
          <div class="item-actions">
            <button class="icon-btn edit" title="Ubah" data-id="${note.id}">✎</button>
            <button class="icon-btn delete" title="Hapus" data-id="${note.id}">✕</button>
          </div>
        </div>
        ${note.body ? `<div class="item-body">${escapeHtml(note.body)}</div>` : ''}
        <div class="item-meta">Diperbarui ${formatDate(note.updatedAt)}</div>
      `;
      itemsList.appendChild(el);
    });

    itemsList.querySelectorAll('.edit').forEach(btn => {
      btn.addEventListener('click', () => editNote(btn.dataset.id));
    });
    itemsList.querySelectorAll('.delete').forEach(btn => {
      btn.addEventListener('click', () => deleteNote(btn.dataset.id));
    });
  }

  saveBtn.addEventListener('click', saveNote);
  cancelBtn.addEventListener('click', resetForm);
  titleInput.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); bodyInput.focus(); } });

  loadNotes();
</script>

</body>
</html>
